<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>🐼 Roter-Panda-Klasse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <img src="transparent-logo.svg" alt="Logo">
      <h2>Roter-Panda</h2>
    </div>

    <nav>
      <button onclick="showPage('login')">🔐 Anmeldung</button>
      <button onclick="showPage('messenger')">💬 Messenger</button>
      <button onclick="showPage('classlist')">👥 Klassenliste</button>
      <button onclick="showPage('homework')">📚 Hausaufgaben</button>
      <button onclick="showPage('timetable')">🗓️ Stundenplan</button>
    </nav>
  </aside>

  <!-- Content -->
  <main class="content">

    <!-- Anmeldung -->
    <section id="login" class="page">
      <h3>🔑 Willkommen zurück</h3>
      <p class="auth-subtitle">Logge dich mit deiner E-Mail ein.</p>

      <div id="login-alert" class="alert"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-email">E-Mail</label>
          <input type="email" id="login-email" placeholder="name@beispiel.de" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="login-password">Passwort</label>
          <div class="input-wrapper">
            <input type="password" id="login-password" placeholder="Dein Passwort" autocomplete="current-password">
            <span class="pw-eye" data-target="login-password">👁</span>
          </div>
        </div>
        <div style="text-align:right;margin-bottom:1rem;margin-top:-0.4rem">
          <a class="auth-link" data-goto="forgot">Passwort vergessen?</a>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Einloggen</button>
      </form>

      <div class="auth-divider"><span>oder</span></div>
      <button onclick="googleLogin()" class="btn btn-secondary" style="width:100%">Google-Anmeldung</button>

      <div class="auth-footer-text">
        Noch kein Account? <a class="auth-link" data-goto="signup">Jetzt registrieren</a>
      </div>
    </section>

    <!-- Messenger -->
    <section id="messenger" class="page hidden">
      <h1>💬 Messenger</h1>
      <div id="groupsList"></div>
      <button onclick="createGroup()">Neue Gruppe</button>
      <div id="chatArea" class="hidden">
        <div class="chat-box" id="messages"></div>
        <div class="chat-input">
          <input type="text" id="messageInput" placeholder="Nachricht eingeben...">
          <button onclick="sendMessage()">Senden</button>
        </div>
      </div>
    </section>

    <!-- Klassenliste -->
    <section id="classlist" class="page hidden">
      <h1>👥 Klassenliste</h1>
      <ul id="classMembers"></ul>
      <div class="input-row">
        <input type="text" id="newMember" placeholder="Name hinzufügen">
        <input type="email" id="memberEmail" placeholder="E-Mail (optional)">
        <input type="tel" id="memberPhone" placeholder="Telefon (optional)">
        <label><input type="checkbox" id="isSick"> Krank heute</label>
        <button onclick="addMember()">+</button>
      </div>
    </section>

    <!-- Hausaufgaben -->
    <section id="homework" class="page hidden">
      <h1>📚 Hausaufgaben</h1>
      <ul id="homeworkList"></ul>
      <div class="input-row">
        <input type="text" id="homeworkSubject" placeholder="Fach">
        <input type="text" id="homeworkDesc" placeholder="Beschreibung">
        <input type="date" id="homeworkDue">
        <button onclick="addHomework()">+</button>
      </div>
    </section>

    <!-- Stundenplan -->
    <section id="timetable" class="page hidden">
      <h1>🗓️ Stundenplan</h1>
      <iframe id="timetableIframe" src="https://example.com" class="iframe"></iframe>
    </section>

  </main>

</div>

<script src="app.js"></script>
</body>
</html>
